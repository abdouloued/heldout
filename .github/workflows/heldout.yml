# Add this to your CI after the agent step.
# Fails the job if heldout detects integrity violations.
name: heldout integrity check

on:
  pull_request:

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install heldout
        run: |
          curl -fsSL https://github.com/abdouloued/heldout/releases/latest/download/heldout-linux-x86_64.tar.gz \
            | tar -xz -C /usr/local/bin

      # Run before agent step — records baseline + snapshots tests
      - name: heldout start
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          ACTOR: ${{ github.actor }}
        run: heldout start "$PR_TITLE" --agent "$ACTOR"

      # ... your agent step goes here ...

      # Check after agent step — replay held-out tests, report findings
      - name: heldout check
        id: heldout
        run: heldout check --json > heldout-report.json
        continue-on-error: true

      - name: Upload heldout report
        uses: actions/upload-artifact@v4
        with:
          name: heldout-report
          path: heldout-report.json

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('heldout-report.json', 'utf8'));
            const verdict = report.verdict;
            const icon = verdict === 'PASS' ? '✅' : '❌';
            const findings = report.findings.length;
            const replayFailed = report.replay.filter(r => r.ran && !r.passed).length;
            const task = report.task || 'none';
            const base = (report.base_commit || '').slice(0,7);
            let body = `## ${icon} heldout integrity — ${verdict}\n\n` +
              `**Findings:** ${findings}  **Replay failures:** ${replayFailed}\n\n`;
            if (findings > 0) {
              body += '| Code | File | Detail |\n|------|------|--------|\n';
              body += report.findings.map(f => `| ${f.code} | \`${f.path}\` | ${f.message} |`).join('\n');
              body += '\n\n';
            }
            body += `*task: ${task}  base: \`${base}\`*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail on integrity violation
        if: steps.heldout.outcome == 'failure'
        run: |
          echo "heldout found integrity violations — see heldout-report.json"
          exit 1
